# docker-compose.ci.yaml
# This version uses the standard Docker Compose variable substitution format.
services:
  db:
    image: postgres:15
    container_name: test-db
    environment:
      POSTGRES_DB: mywebsite
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d mywebsite"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ${WEB_IMAGE}
    container_name: test-web
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: mywebsite
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

